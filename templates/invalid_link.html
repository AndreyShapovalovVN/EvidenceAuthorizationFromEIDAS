<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Invalid Link</title>
    <meta http-equiv="refresh" content="3; url={{ returnurl }}">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .error-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #d32f2f;
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        p {
            color: #666;
            margin: 10px 0;
            font-size: 16px;
        }
        .countdown {
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
        }
        a:hover {
            background: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">⚠️</div>
        <h1>Неправильне посилання</h1>
        <p>{{ message }}</p>
        <p>Ви будете перенаправлені через 3 секунди...</p>
        <div class="countdown" id="countdown">Перейти зараз</div>
        <a href="{{ returnurl }}">Повернутися</a>
    </div>
    <script>
        let countdown = 3;
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                countdownEl.textContent = `Перейти через ${countdown}...`;
            } else {
                clearInterval(timer);
                window.location.href = "{{ returnurl }}";
            }
        }, 1000);
    </script>
</body>
</html>
