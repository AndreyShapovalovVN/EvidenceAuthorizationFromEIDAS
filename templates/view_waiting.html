<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Evidence...</title>
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/view_waiting.css">
</head>
<body>
<div class="waiting-wrapper">
    <div class="waiting-card">
        <h1 class="waiting-title">⏳ Loading Evidence</h1>

        <ul class="stage-list">
            <li class="stage-item" id="stage-preview">
                <div class="stage-badge active">
                    <div class="spinner"></div>
                </div>
                <div class="stage-content">
                    <p class="stage-name">Step 1: Preview Ready</p>
                    <p class="stage-hint">Waiting for preview flag from service...</p>
                    <div class="stage-progress-head">
                        <span id="stage1Checks">0 / 0 checks</span>
                        <span id="stage1Percent">0%</span>
                    </div>
                    <div class="stage-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="stage1Track">
                        <div id="stage1Fill" class="stage-progress-fill"></div>
                    </div>
                </div>
            </li>

            <li class="stage-item" id="stage-evidence">
                <div class="stage-badge pending">2</div>
                <div class="stage-content">
                    <p class="stage-name">Step 2: Evidence Retrieved</p>
                    <p class="stage-hint">Waiting for evidence from service...</p>
                    <div class="stage-progress-head">
                        <span id="stage2Checks">0 / 0 checks</span>
                        <span id="stage2Percent">0%</span>
                    </div>
                    <div class="stage-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="stage2Track">
                        <div id="stage2Fill" class="stage-progress-fill"></div>
                    </div>
                </div>
            </li>
        </ul>

        <div class="waiting-message">
            Message ID: <code class="waiting-message-id">{{ message_id }}</code>
        </div>
        <div id="timeoutNotice" class="timeout-notice"></div>
    </div>
</div>

<script>
    const messageId = "{{ message_id }}";
    const continueUrl = {{ returnurl | default('', true) | tojson }};
    const maxWaitTime = {{ wait_time }} * 1000; // мілісекунди
    const pollInterval = {{ poll_interval }} * 1000;
    const startTime = Date.now();
    const maxChecks = Math.max(1, Math.ceil(maxWaitTime / pollInterval));
    const stageChecks = {
        stage1: 0,
        stage2: 0,
    };

    async function checkProgress() {
        try {
            const response = await fetch(`/preview/progress/${messageId}`);
            if (!response.ok) {
                console.error("Progress check failed:", response.status);
                return;
            }

            const data = await response.json();
            updatePerStageTaskbars(data.stage);
            updateStages(data.stage);

            if (data.stage >= 2) {
                // Обидва етапи готові, редиректимо
                setTimeout(() => {
                    if (continueUrl) {
                        window.location.href = continueUrl;
                    } else {
                        window.location.reload();
                    }
                }, 500);
            }
        } catch (error) {
            console.error("Error checking progress:", error);
        }
    }

    function updatePerStageTaskbars(stage) {
        if (stage < 1) {
            stageChecks.stage1 = Math.min(stageChecks.stage1 + 1, maxChecks);
        } else if (stage < 2) {
            stageChecks.stage2 = Math.min(stageChecks.stage2 + 1, maxChecks);
        }

        const stage1Progress = stage >= 1 ? 100 : Math.min(99, Math.round((stageChecks.stage1 / maxChecks) * 100));
        const stage2Progress = stage >= 2
            ? 100
            : (stage >= 1 ? Math.min(99, Math.round((stageChecks.stage2 / maxChecks) * 100)) : 0);

        renderStageTaskbar("1", stage1Progress, stageChecks.stage1);
        renderStageTaskbar("2", stage2Progress, stageChecks.stage2);
    }

    function renderStageTaskbar(stageNo, progress, checksDone) {
        const fill = document.getElementById(`stage${stageNo}Fill`);
        const percent = document.getElementById(`stage${stageNo}Percent`);
        const checks = document.getElementById(`stage${stageNo}Checks`);
        const track = document.getElementById(`stage${stageNo}Track`);

        fill.style.width = `${progress}%`;
        percent.textContent = `${progress}%`;
        checks.textContent = `${checksDone} / ${maxChecks} checks`;
        track.setAttribute("aria-valuenow", String(progress));
    }

    function updateStages(stage) {
        const stagePreview = document.getElementById("stage-preview");
        const stageEvidence = document.getElementById("stage-evidence");

        if (stage >= 1) {
            const badge1 = stagePreview.querySelector(".stage-badge");
            badge1.innerHTML = '✓';
            badge1.className = "stage-badge done";
        }

        if (stage >= 2) {
            const badge2 = stageEvidence.querySelector(".stage-badge");
            badge2.innerHTML = '✓';
            badge2.className = "stage-badge done";
            stageEvidence.querySelector(".stage-hint").textContent = "Evidence received.";
        }
    }

    // Перевіряємо прогрес кожні N секунд
    const pollId = setInterval(() => {
        const elapsed = Date.now() - startTime;
        if (elapsed > maxWaitTime) {
            clearInterval(pollId);
            const timeoutNotice = document.getElementById("timeoutNotice");
            timeoutNotice.textContent = "Timeout reached. Redirecting you back...";
            timeoutNotice.style.display = "block";

            // Записуємо таймаут в Redis
            fetch(`/preview/timeout/${messageId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
            }).catch(err => console.error("Failed to record timeout:", err));

            setTimeout(() => {
                if (continueUrl) {
                    window.location.href = continueUrl;
                }
            }, 1200);
        } else {
            checkProgress();
        }
    }, pollInterval);

    // Перший раз перевіряємо одразу
    checkProgress();
</script>
</body>
</html>
