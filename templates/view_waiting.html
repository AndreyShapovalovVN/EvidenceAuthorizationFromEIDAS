<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Evidence...</title>
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/view_waiting.css">
</head>
<body>
<div class="waiting-wrapper">
    <div class="waiting-card">
        <h1 class="waiting-title">⏳ Loading Evidence</h1>

        <div class="taskbar-wrap" aria-live="polite">
            <div class="taskbar-head">
                <span>Progress</span>
                <span id="taskbarPercent">0%</span>
            </div>
            <div class="taskbar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="taskbarTrack">
                <div id="taskbarFill" class="taskbar-fill"></div>
            </div>
            <p id="taskbarStatus" class="taskbar-status">Waiting for preview flag...</p>
        </div>

        <ul class="stage-list">
            <li class="stage-item" id="stage-preview">
                <div class="stage-badge active">
                    <div class="spinner"></div>
                </div>
                <div class="stage-content">
                    <p class="stage-name">Step 1: Preview Ready</p>
                    <p class="stage-hint">Waiting for preview flag from service...</p>
                </div>
            </li>

            <li class="stage-item" id="stage-evidence">
                <div class="stage-badge pending">2</div>
                <div class="stage-content">
                    <p class="stage-name">Step 2: Evidence Retrieved</p>
                    <p class="stage-hint">Waiting for evidence from service...</p>
                </div>
            </li>
        </ul>

        <div class="waiting-message">
            Message ID: <code class="waiting-message-id">{{ message_id }}</code>
        </div>
        <div id="timeoutNotice" class="timeout-notice"></div>
    </div>
</div>

<script>
    const messageId = "{{ message_id }}";
    const returnurl = "{{ returnurl | default('', true) }}";
    const maxWaitTime = {{ wait_time }} * 1000; // мілісекунди
    const pollInterval = {{ poll_interval }} * 1000;
    const startTime = Date.now();

    async function checkProgress() {
        try {
            const response = await fetch(`/preview/progress/${messageId}`);
            if (!response.ok) {
                console.error("Progress check failed:", response.status);
                return;
            }

            const data = await response.json();
            updateStages(data.stage);
            updateTaskbar(data.stage);

            if (data.stage >= 2) {
                // Обидва етапи готові, редиректимо
                setTimeout(() => {
                    window.location.href = window.location.href;
                }, 500);
            }
        } catch (error) {
            console.error("Error checking progress:", error);
        }
    }

    function updateTaskbar(stage) {
        const fill = document.getElementById("taskbarFill");
        const percent = document.getElementById("taskbarPercent");
        const status = document.getElementById("taskbarStatus");
        const track = document.getElementById("taskbarTrack");

        let progress = 0;
        let text = "Waiting for preview flag...";

        if (stage >= 1) {
            progress = 50;
            text = "Preview is ready. Waiting for evidence...";
        }
        if (stage >= 2) {
            progress = 100;
            text = "Evidence is ready. Opening preview...";
        }

        fill.style.width = `${progress}%`;
        percent.textContent = `${progress}%`;
        track.setAttribute("aria-valuenow", String(progress));
        status.textContent = text;
    }

    function updateStages(stage) {
        const stagePreview = document.getElementById("stage-preview");
        const stageEvidence = document.getElementById("stage-evidence");

        if (stage >= 1) {
            const badge1 = stagePreview.querySelector(".stage-badge");
            badge1.innerHTML = '✓';
            badge1.className = "stage-badge done";
        }

        if (stage >= 2) {
            const badge2 = stageEvidence.querySelector(".stage-badge");
            badge2.innerHTML = '<div class="spinner"></div>';
            badge2.className = "stage-badge active";
            stageEvidence.querySelector(".stage-hint").textContent = "Loading...";
        }
    }

    // Перевіряємо прогрес кожні N секунд
    const pollId = setInterval(() => {
        const elapsed = Date.now() - startTime;
        if (elapsed > maxWaitTime) {
            clearInterval(pollId);
            const timeoutNotice = document.getElementById("timeoutNotice");
            timeoutNotice.textContent = "Timeout reached. Redirecting you back...";
            timeoutNotice.style.display = "block";

            // Записуємо таймаут в Redis
            fetch(`/preview/timeout/${messageId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
            }).catch(err => console.error("Failed to record timeout:", err));

            setTimeout(() => {
                window.location.href = returnurl;
            }, 1200);
        } else {
            checkProgress();
        }
    }, pollInterval);

    // Перший раз перевіряємо одразу
    updateTaskbar(0);
    checkProgress();
</script>
</body>
</html>
