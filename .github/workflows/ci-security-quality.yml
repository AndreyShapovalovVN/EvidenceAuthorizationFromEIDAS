name: CI Security & Quality

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:


jobs:
  code-quality:
    name: Python Code Quality
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Install dependencies
        # uv.lock is committed; --frozen prevents resolving or changing it.
        # --no-build rejects dependencies that would execute a build backend.
        run: uv sync --frozen --no-build --no-install-project --extra dev # NOSONAR (S8544: versions are locked by uv.lock)

      - name: Lint with Ruff
        run: uv run --no-sync ruff check . --extend-exclude 'tests/~*.py' # NOSONAR

      - name: Type check with mypy
        run: uv run --no-sync  mypy . --ignore-missing-imports --pretty --show-error-codes # NOSONAR

      - name: Run tests with pytest
        run: uv run --no-sync  pytest --maxfail=2 --disable-warnings --ignore-glob='tests/~*.py' # NOSONAR

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 1